# 하루등불 — Hetzner 셀프호스트 (Caddy 미사용: Cloudflare Tunnel로 노출)
# 공개: haru.daltavern.org → cloudflared(host) → http://localhost:3000
services:
  # 마이그레이션 + 시드 원샷. db가 healthy해진 뒤 1회 실행되고 종료.
  # app/worker는 이 작업이 성공 완료된 뒤에 기동한다.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    command: ["sh", "-c", "npm run db:migrate && npm run db:seed"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # 운영 스크립트 일회용 실행기. 평소엔 안 뜬다(profiles: tools).
  #   표준 경로: docker compose run --rm tools npm run <script>
  #   예) ... npm run db:migrate / db:seed / encrypt-keys / reset-password -- <id> / test:isolation
  # dev 의존성 포함 이미지(Dockerfile.worker = npm install 전체) + 소스 마운트로 리빌드 없이 실행.
  tools:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app # 현재 소스 마운트(리빌드 없이 스크립트 반영)
      - /app/node_modules # 컨테이너 내부 node_modules 보존(alpine 네이티브 바이너리)
    # 인자 없이 뜨면 안내만. 실제로는 run 뒤 인자가 이 command 를 덮어쓴다.
    command: ["sh", "-c", "echo 'tools: docker compose run --rm tools npm run <script>'"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
      - AVATARS_DIR=/data/avatars
    volumes:
      # 캐릭터 아바타 영속 저장(업로드/서빙). app 은 nextjs 비루트 유저로 실행되므로
      # host의 ./data/avatars 가 쓰기 가능해야 한다(첫 업로드 시 자동 생성, 권한 확인 권장).
      - ./data/avatars:/data/avatars
    ports:
      # 터널(cloudflared, host systemd)만 접근. 인터넷 직접 노출 없음.
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - NODE_ENV=production
      - BACKUP_DIR=/data/backups
    volumes:
      # backupJob 의 pg_dump 산출물(매일 04:00, 7일 로테이션). host ./data/backups 에 보존.
      - ./data/backups:/data/backups
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    # 포트 비공개: host에 노출하지 않음 (docker 내부망에서만 app/worker가 접근)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
