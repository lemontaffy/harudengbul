# 하루등불 — Hetzner 셀프호스트 (Caddy 미사용: Cloudflare Tunnel로 노출)
# 공개: haru.daltavern.org → cloudflared(host) → http://localhost:3000
services:
  # 마이그레이션 + 시드 원샷. db가 healthy해진 뒤 1회 실행되고 종료.
  # app/worker는 이 작업이 성공 완료된 뒤에 기동한다.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    command: ["sh", "-c", "npm run db:migrate && npm run db:seed"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
      - AVATARS_DIR=/data/avatars
    volumes:
      # 캐릭터 아바타 영속 저장(업로드/서빙). app 은 nextjs 비루트 유저로 실행되므로
      # host의 ./data/avatars 가 쓰기 가능해야 한다(첫 업로드 시 자동 생성, 권한 확인 권장).
      - ./data/avatars:/data/avatars
    ports:
      # 터널(cloudflared, host systemd)만 접근. 인터넷 직접 노출 없음.
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    # 포트 비공개: host에 노출하지 않음 (docker 내부망에서만 app/worker가 접근)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
