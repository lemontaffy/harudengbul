# 하루등불 — Hetzner 셀프호스트 (Caddy 미사용: Cloudflare Tunnel로 노출)
# 공개: haru.daltavern.org → cloudflared(host) → http://localhost:3000
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      # 터널(cloudflared, host systemd)만 접근. 인터넷 직접 노출 없음.
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    # 포트 비공개: host에 노출하지 않음 (docker 내부망에서만 app/worker가 접근)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
